{% extends "layout.html" %}
{% block body %}

<div class="main-content">
  <div class="books-grid" id="search-results-grid"></div>
  <div id="search-empty-state" class="search-empty-state">
    <p>Add filters and click Search to find books</p>
  </div>
  <div id="search-no-results" class="search-empty-state" style="display:none;">
    <h2>{{_('No Results Found')}}</h2>
    <p>Try adjusting your filters</p>
  </div>
  <div id="search-result-count" class="search-result-count" style="display:none;"></div>
</div>

<div id="book-popover">
  <div id="book-popover-arrow"></div>
  <button id="popover-close" type="button" aria-label="Close">&times;</button>
  <h3 id="popover-title"></h3>
  <h4 id="popover-author"></h4>
  <p id="popover-rating"></p>
  <p id="popover-description"></p>
  <div id="popover-actions">
    <button id="popover-read-btn" class="btn-primary" href="#">
      <div class="btn-icon">
        <svg width="20" height="20" viewBox="0 0 256 256"><path d="M232,48H160a40,40,0,0,0-32,16A40,40,0,0,0,96,48H24a8,8,0,0,0-8,8V200a8,8,0,0,0,8,8H96a24,24,0,0,1,24,24,8,8,0,0,0,16,0,24,24,0,0,1,24-24h72a8,8,0,0,0,8-8V56A8,8,0,0,0,232,48ZM96,192H32V64H96a24,24,0,0,1,24,24V200A39.81,39.81,0,0,0,96,192Zm128,0H160a39.81,39.81,0,0,0-24,8V88a24,24,0,0,1,24-24h64Z"></path></svg>
      </div>
      Read Now
    </button>
    <button id="popover-details-btn" class="btn-secondary" href="#">
      Details
      <div class="btn-icon">
        <svg width="20" height="20" viewBox="0 0 256 256"><path d="M221.66,133.66l-72,72a8,8,0,0,1-11.32-11.32L196.69,136H40a8,8,0,0,1,0-16H196.69L138.34,61.66a8,8,0,0,1,11.32-11.32l72,72A8,8,0,0,1,221.66,133.66Z"></path></svg>
      </div>
    </button>
  </div>
</div>

<!-- Field templates for the sidebar form -->
<template id="tpl-title">
  <div class="search-field-row" data-field="title">
    <button type="button" class="search-remove-btn" title="{{_('Remove')}}">&times;</button>
    <div class="book-edit-group">
      <label class="book-edit-label">{{_('Book Title')}}</label>
      <input type="text" class="book-edit-field" name="title" value="">
    </div>
  </div>
</template>

<template id="tpl-authors">
  <div class="search-field-row" data-field="authors">
    <button type="button" class="search-remove-btn" title="{{_('Remove')}}">&times;</button>
    <div class="book-edit-group">
      <label class="book-edit-label">{{_('Author')}}</label>
      <input type="text" class="book-edit-field" name="authors" value="">
    </div>
  </div>
</template>

<template id="tpl-publisher">
  <div class="search-field-row" data-field="publisher">
    <button type="button" class="search-remove-btn" title="{{_('Remove')}}">&times;</button>
    <div class="book-edit-group">
      <label class="book-edit-label">{{_('Publisher')}}</label>
      <input type="text" class="book-edit-field" name="publisher" value="">
    </div>
  </div>
</template>

<template id="tpl-comments">
  <div class="search-field-row" data-field="comments">
    <button type="button" class="search-remove-btn" title="{{_('Remove')}}">&times;</button>
    <div class="book-edit-group">
      <label class="book-edit-label">{{_('Description')}}</label>
      <input type="text" class="book-edit-field" name="comments" value="">
    </div>
  </div>
</template>

<template id="tpl-publishstart">
  <div class="search-field-row" data-field="publishstart">
    <button type="button" class="search-remove-btn" title="{{_('Remove')}}">&times;</button>
    <div class="book-edit-group">
      <label class="book-edit-label">{{_('Published Date From')}}</label>
      <input type="date" class="book-edit-field" name="publishstart">
    </div>
  </div>
</template>

<template id="tpl-publishend">
  <div class="search-field-row" data-field="publishend">
    <button type="button" class="search-remove-btn" title="{{_('Remove')}}">&times;</button>
    <div class="book-edit-group">
      <label class="book-edit-label">{{_('Published Date To')}}</label>
      <input type="date" class="book-edit-field" name="publishend">
    </div>
  </div>
</template>

<template id="tpl-read_status">
  <div class="search-field-row" data-field="read_status">
    <button type="button" class="search-remove-btn" title="{{_('Remove')}}">&times;</button>
    <div class="book-edit-group">
      <label class="book-edit-label">{{_('Read Status')}}</label>
      <select name="read_status" class="book-edit-field">
        <option value="Any" selected>{{_('Any')}}</option>
        <option value="">{{_('Empty')}}</option>
        <option value="True">{{_('Yes')}}</option>
        <option value="False">{{_('No')}}</option>
      </select>
    </div>
  </div>
</template>

<template id="tpl-include_tag">
  <div class="search-field-row" data-field="include_tag">
    <button type="button" class="search-remove-btn" title="{{_('Remove')}}">&times;</button>
    <div class="book-edit-group">
      <label class="book-edit-label">{{_('Include Tags')}}</label>
      <select class="book-edit-field" name="include_tag" multiple size="5">
        {% for tag in tags %}
        <option value="{{tag.id}}">{{tag.name}}</option>
        {% endfor %}
      </select>
      <span class="search-hint">Hold Ctrl/Cmd to select multiple</span>
    </div>
  </div>
</template>

<template id="tpl-exclude_tag">
  <div class="search-field-row" data-field="exclude_tag">
    <button type="button" class="search-remove-btn" title="{{_('Remove')}}">&times;</button>
    <div class="book-edit-group">
      <label class="book-edit-label">{{_('Exclude Tags')}}</label>
      <select class="book-edit-field" name="exclude_tag" multiple size="5">
        {% for tag in tags %}
        <option value="{{tag.id}}">{{tag.name}}</option>

      </select>
      <span class="search-hint">Hold Ctrl/Cmd to select multiple</span>

</template>

<template id="tpl-include_serie">
  <div class="search-field-row" data-field="include_serie">

    <div class="book-edit-group">

<template id="tpl-exclude_serie">
  <div class="search-field-row" data-field="exclude_serie">
    <button type="button" class="search-remove-btn" title="{{_('Remove')}}">&times;</button>
    <div class="book-edit-group">
      <label class="book-edit-label">{{_('Exclude Series')}}</label>
      <select class="book-edit-field" name="exclude_serie" multiple size="5">
        {% for serie in series %}
        <option value="{{serie.id}}">{{serie.name}}</option>
        {% endfor %}
      </select>
      <span class="search-hint">Hold Ctrl/Cmd to select multiple</span>
    </div>
  </div>
</template>

<template id="tpl-ratinghigh">
  <div class="search-field-row" data-field="ratinghigh">
    <button type="button" class="search-remove-btn" title="{{_('Remove')}}">&times;</button>
    <div class="book-edit-group">
      <label class="book-edit-label">{{_('Rating Above')}}</label>
      <input type="number" min="0" max="5" step="0.5" name="ratinghigh" class="book-edit-field">
    </div>
  </div>
</template>

<template id="tpl-ratinglow">
  <div class="search-field-row" data-field="ratinglow">
    <button type="button" class="search-remove-btn" title="{{_('Remove')}}">&times;</button>
    <div class="book-edit-group">
      <label class="book-edit-label">{{_('Rating Below')}}</label>
      <input type="number" min="0" max="5" step="0.5" name="ratinglow" class="book-edit-field">
    </div>
  </div>
</template>

{% for c in cc %}
<template id="tpl-custom_column_{{ c.id }}">
  <div class="search-field-row" data-field="custom_column_{{ c.id }}">
    <button type="button" class="search-remove-btn" title="{{_('Remove')}}">&times;</button>
    <div class="book-edit-group">
      <label class="book-edit-label">{{ c.name }}</label>
      {% if c.datatype == 'bool' %}
        <select name="custom_column_{{ c.id }}" class="book-edit-field">
          <option value="Any" selected>{{_('Any')}}</option>
          <option value="">{{_('Empty')}}</option>
          <option value="True">{{_('Yes')}}</option>
          <option value="False">{{_('No')}}</option>
        </select>
      {% elif c.datatype in ['int', 'float'] %}
        <div class="book-edit-inline">
          <div class="book-edit-group">
            <input type="number" step="{{ '0.01' if c.datatype == 'float' else '1' }}" class="book-edit-field" name="custom_column_{{ c.id }}_low" placeholder="From">
          </div>
          <div class="book-edit-group">
            <input type="number" step="{{ '0.01' if c.datatype == 'float' else '1' }}" class="book-edit-field" name="custom_column_{{ c.id }}_high" placeholder="To">
          </div>
        </div>
      {% elif c.datatype == 'datetime' %}
        <div class="book-edit-inline">
          <div class="book-edit-group">
            <input type="date" class="book-edit-field" name="custom_column_{{ c.id }}_start">
          </div>
          <div class="book-edit-group">
            <input type="date" class="book-edit-field" name="custom_column_{{ c.id }}_end">
          </div>
        </div>
      {% elif c.datatype == 'enumeration' %}
        <select class="book-edit-field" name="custom_column_{{ c.id }}">
          <option value=""></option>
          {% for opt in c.get_display_dict().enum_values %}
          <option value="{{ opt }}">{{ opt }}</option>
          {% endfor %}
        </select>
      {% else %}
        <input type="text" class="book-edit-field" name="custom_column_{{ c.id }}">
      {% endif %}
    </div>
  </div>
</template>
{% endfor %}

{% endblock %}

{% block js %}
<script>
(function() {
  // --- Sidebar form: add/remove fields ---
  var addBtn = document.getElementById('add-field-btn');
  var menu = document.getElementById('field-menu');
  var container = document.getElementById('search-fields');
  var form = document.getElementById('adv-search-form');

  function addField(fieldKey) {
    var tpl = document.getElementById('tpl-' + fieldKey);
    if (!tpl) return;
    var clone = tpl.content.cloneNode(true);
    var row = clone.querySelector('.search-field-row');
    var item = menu.querySelector('[data-field="' + fieldKey + '"]');
    if (item) item.style.display = 'none';
    menu.classList.remove('search-field-menu-open');
    container.appendChild(clone);
    requestAnimationFrame(function() { row.classList.add('search-field-row-visible'); });
    var input = row.querySelector('input, select');
    if (input) input.focus();
  }

  addBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    menu.classList.toggle('search-field-menu-open');
  });

  menu.addEventListener('click', function(e) {
    var item = e.target.closest('.search-field-menu-item');
    if (!item) return;
    addField(item.dataset.field);
  });

  container.addEventListener('click', function(e) {
    var btn = e.target.closest('.search-remove-btn');
    if (!btn) return;
    var row = btn.closest('.search-field-row');
    var fieldKey = row.dataset.field;
    var item = menu.querySelector('[data-field="' + fieldKey + '"]');
    if (item) item.style.display = '';
    row.remove();
  });

  document.addEventListener('click', function(e) {
    if (!addBtn.contains(e.target) && !menu.contains(e.target)) {
      menu.classList.remove('search-field-menu-open');
    }
  });

  // --- AJAX search ---
  var grid = document.getElementById('search-results-grid');
  var emptyState = document.getElementById('search-empty-state');
  var noResults = document.getElementById('search-no-results');
  var resultCount = document.getElementById('search-result-count');
  var csrfToken = document.querySelector('input[name="csrf_token"]').value;

  function collectFormData() {
    var data = {};
    var fields = container.querySelectorAll('.search-field-row');
    fields.forEach(function(row) {
      var inputs = row.querySelectorAll('input, select');
      inputs.forEach(function(input) {
        var name = input.name;
        if (!name) return;
        if (input.tagName === 'SELECT' && input.multiple) {
          var selected = Array.from(input.selectedOptions).map(function(o) { return o.value; });
          if (selected.length) data[name] = selected;
        } else if (input.value) {
          data[name] = input.value;
        }
      });
    });
    return data;
  }

  function stripTags(html) {
    var tmp = document.createElement('div');
    tmp.innerHTML = html;
    return (tmp.textContent || tmp.innerText || '').substring(0, 200);
  }

  function renderResults(books) {
    grid.innerHTML = '';
    emptyState.style.display = 'none';
    noResults.style.display = 'none';
    resultCount.style.display = 'none';

    if (!books.length) {
      noResults.style.display = '';
      return;
    }

    resultCount.textContent = books.length + ' result' + (books.length !== 1 ? 's' : '');
    resultCount.style.display = '';

    books.forEach(function(book) {
      var div = document.createElement('div');
      div.className = 'book-cover';
      div.dataset.bookId = book.id;
      div.dataset.title = book.title;
      div.dataset.sortTitle = book.sort || '';
      div.dataset.author = book.authors;
      div.dataset.authorSort = book.author_sort || '';
      div.dataset.rating = book.rating || '';
      div.dataset.description = stripTags(book.description);
      div.dataset.format = book.format;
      div.dataset.readUrl = book.read_url;
      div.dataset.detailUrl = book.detail_url;
      div.dataset.tags = (book.tags || []).join('||');
      div.dataset.languages = (book.languages || []).join('||');
      div.dataset.series = (book.series || []).join('||');
      div.dataset.publishers = (book.publishers || []).join('||');
      div.dataset.pubdate = book.pubdate || '';
      div.dataset.timestamp = book.timestamp || '';

      var img = document.createElement('img');
      img.src = book.cover_url;
      img.alt = book.title;
      img.loading = 'lazy';
      img.onerror = function() {
        this.style.display = 'none';
        this.nextElementSibling.style.display = 'flex';
      };
      div.appendChild(img);

      var fallback = document.createElement('div');
      fallback.className = 'book-cover-fallback';
      fallback.style.display = 'none';
      var titleSpan = document.createElement('span');
      titleSpan.className = 'book-cover-fallback-title';
      titleSpan.textContent = book.title;
      var authorSpan = document.createElement('span');
      authorSpan.className = 'book-cover-fallback-author';
      authorSpan.textContent = book.authors;
      fallback.appendChild(titleSpan);
      fallback.appendChild(authorSpan);
      div.appendChild(fallback);

      grid.appendChild(div);
    });
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var data = collectFormData();
    var submitBtn = document.getElementById('adv_submit');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Searching...';

    fetch('{{ url_for("search.ajax_advanced_search") }}', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': csrfToken
      },
      body: JSON.stringify(data)
    })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      renderResults(result.books);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Search';
    })
    .catch(function(err) {
      console.error('Search failed:', err);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Search';
    });
  });

  // --- Popover ---
  var popover = document.getElementById('book-popover');
  var overlay = document.getElementById('popover-overlay');
  var activeCard = null;

  function showPopover(cover) {
    document.querySelector('.main-content-wrapper').style.overflowY = 'hidden';
    document.getElementById('popover-title').textContent = cover.dataset.title || '';
    document.getElementById('popover-author').textContent = cover.dataset.author || '';
    var rating = cover.dataset.rating;
    document.getElementById('popover-rating').textContent = rating ? '\u2605 ' + parseFloat(rating).toFixed(1) + ' / 5' : '';
    document.getElementById('popover-description').textContent = cover.dataset.description || '';

    var readBtn = document.getElementById('popover-read-btn');
    var detailsBtn = document.getElementById('popover-details-btn');
    var readUrl = cover.dataset.readUrl;
    if (readUrl) {
      readBtn.style.display = '';
      readBtn.onclick = function() { window.location.href = readUrl; };
    } else {
      readBtn.style.display = 'none';
    }
    detailsBtn.onclick = function() {
      var detailUrl = cover.dataset.detailUrl;
      if (detailUrl) window.location.href = detailUrl;
    };

    popover.classList.remove('arrow-right');
    popover.style.visibility = 'hidden';
    popover.style.display = 'block';

    var pw = popover.offsetWidth;
    var ph = popover.offsetHeight;
    var rect = cover.getBoundingClientRect();
    var gap = 12;
    var left = rect.right + gap;
    if (left + pw > window.innerWidth - 8) {
      left = rect.left - gap - pw;
      popover.classList.add('arrow-right');
    }
    var top = rect.top + rect.height / 2 - ph / 2;
    top = Math.max(8, Math.min(top, window.innerHeight - ph - 8));

    popover.style.top = top + 'px';
    popover.style.left = left + 'px';
    popover.style.visibility = '';
    popover.classList.remove('animating');
    void popover.offsetWidth;
    popover.classList.add('animating');

    activeCard = cover;
    overlay.style.display = 'block';
    activeCard.style.position = 'relative';
    activeCard.style.zIndex = '51';
  }

  function hidePopover() {
    document.querySelector('.main-content-wrapper').style.overflowY = '';
    popover.style.display = 'none';
    overlay.style.display = 'none';
    if (activeCard) {
      activeCard.style.position = '';
      activeCard.style.zIndex = '';
    }
    activeCard = null;
  }

  grid.addEventListener('click', function(e) {
    var cover = e.target.closest('.book-cover');
    if (cover) {
      if (activeCard === cover) { hidePopover(); }
      else { showPopover(cover); }
      e.stopPropagation();
    }
  });

  document.addEventListener('click', function(e) {
    if (activeCard && !popover.contains(e.target)) hidePopover();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') hidePopover();
  });

  var closeBtn = document.getElementById('popover-close');
  if (closeBtn) closeBtn.addEventListener('click', hidePopover);

  popover.addEventListener('click', function(e) { e.stopPropagation(); });
})();
</script>
{% endblock %}
{% block header %}{% endblock %}
