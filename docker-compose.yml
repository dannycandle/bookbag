services:
  bookbag:
    image: codeberg.org/bookbag/bookbag:latest
    # For the light image (without Calibre tools), use:
    # image: codeberg.org/bookbag/bookbag:light
    container_name: bookbag
    ports:
      - "8084:8084"
    volumes:
      - ./books:/books
      - ./config:/config
    restart: unless-stopped
